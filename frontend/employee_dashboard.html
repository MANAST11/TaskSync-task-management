<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Employee portal to view assigned tasks, update completion percentage progress, add status comments, and manage workspace profiles.">
    <title>Employee Workspace - TaskSync</title>
    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .layout-container {
            display: grid;
            grid-template-columns: 320px 1fr;
            min-height: 100vh;
        }

        /* Profile Left Sidebar Panel */
        .profile-panel {
            background: rgba(17, 24, 39, 0.95);
            border-right: 1px solid var(--border-light);
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            backdrop-filter: var(--blur-glass);
        }

        .brand-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-icon {
            font-size: 1.5rem;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary-glow);
        }

        .brand-text {
            font-weight: 700;
            font-size: 1.25rem;
        }

        /* Profile details card */
        .profile-card {
            padding: 24px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .profile-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 700;
            color: #FFF;
            margin-bottom: 10px;
        }

        .profile-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #FFF;
        }

        .profile-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .profile-item-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 600;
        }

        .profile-item-val {
            font-size: 0.85rem;
            color: var(--text-primary);
        }

        /* Main employee grid layout */
        .workspace-main {
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        .welcome-header {
            margin-bottom: 30px;
        }

        /* Task Cards grid layout */
        .task-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        .task-card {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: var(--transition-smooth);
            position: relative;
        }
        
        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md), var(--shadow-glow);
            border-color: var(--border-focus);
        }

        .task-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
        }

        .task-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #FFF;
        }

        .task-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            flex-grow: 1;
            min-height: 50px;
        }

        /* Progress bars */
        .progress-bar-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .progress-bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .progress-bar-track {
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 4px;
            transition: width 0.4s ease;
        }

        .task-card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-light);
            padding-top: 15px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .task-card-remarks {
            padding: 10px;
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.02);
            border-left: 3px solid var(--border-light);
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-style: italic;
        }

        /* Mini statistics grid */
        .mini-stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .mini-stat-card {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            text-align: center;
        }

        .mini-stat-val {
            font-size: 1.5rem;
            font-weight: 700;
            color: #FFF;
        }

        .mini-stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="layout-container">
        <!-- Sidebar containing profile & details -->
        <aside class="profile-panel">
            <div class="brand-header">
                <span class="brand-icon">⚡</span>
                <span class="brand-text">TaskSync</span>
            </div>

            <!-- Profile Info Card -->
            <div class="profile-card">
                <div class="profile-avatar" id="profile-initials">?</div>
                <div class="profile-name" id="profile-full-name">Loading...</div>
                
                <hr style="border: 0; border-top: 1px solid var(--border-light); margin: 8px 0;">

                <div class="profile-item">
                    <span class="profile-item-label">Username</span>
                    <span class="profile-item-val" id="profile-username">-</span>
                </div>
                <div class="profile-item">
                    <span class="profile-item-label">Email</span>
                    <span class="profile-item-val" id="profile-email">-</span>
                </div>
                <div class="profile-item">
                    <span class="profile-item-label">Phone</span>
                    <span class="profile-item-val" id="profile-phone">-</span>
                </div>
                <div class="profile-item">
                    <span class="profile-item-label">Department</span>
                    <span class="profile-item-val" id="profile-dept">-</span>
                </div>
                <div class="profile-item">
                    <span class="profile-item-label">Designation</span>
                    <span class="profile-item-val" id="profile-designation">-</span>
                </div>
            </div>

            <button id="logout-btn" class="btn btn-secondary" style="width: 100%; margin-top: auto;">🚪 Logout</button>
        </aside>

        <!-- Main Workspace Workspace -->
        <main class="workspace-main">
            <div class="loading-overlay" id="loader-overlay">
                <div class="loading-spinner"></div>
            </div>

            <div class="welcome-header">
                <h1 id="welcome-title">My Assignments</h1>
                <p style="color: var(--text-secondary); font-size: 0.9rem;">Review and update progress of your active task assignments.</p>
            </div>

            <!-- Mini Summary Metrics Grid -->
            <div class="mini-stats-grid">
                <div class="mini-stat-card glass-panel">
                    <span class="mini-stat-val" id="stat-total">0</span>
                    <span class="mini-stat-label">Assigned</span>
                </div>
                <div class="mini-stat-card glass-panel" style="border-bottom: 2px solid var(--warning);">
                    <span class="mini-stat-val" id="stat-in-progress">0</span>
                    <span class="mini-stat-label">In Progress</span>
                </div>
                <div class="mini-stat-card glass-panel" style="border-bottom: 2px solid var(--success);">
                    <span class="mini-stat-val" id="stat-completed">0</span>
                    <span class="mini-stat-label">Completed</span>
                </div>
                <div class="mini-stat-card glass-panel" style="border-bottom: 2px solid var(--primary);">
                    <span class="mini-stat-val" id="stat-efficiency">0%</span>
                    <span class="mini-stat-label">Total Progress</span>
                </div>
            </div>

            <!-- Assigned Tasks Grid cards -->
            <div class="task-grid" id="task-grid-container">
                <!-- Dynamic cards -->
                <div style="text-align: center; color: var(--text-muted); grid-column: 1/-1; padding: 40px;">Loading your task assignment board...</div>
            </div>
        </main>
    </div>

    <!-- MODAL: UPDATE STATUS -->
    <div class="modal-overlay" id="status-modal">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h3>Update Task Status</h3>
                <button class="modal-close" onclick="closeModal('status-modal')">&times;</button>
            </div>
            <form id="status-form">
                <input type="hidden" id="modal-assignment-id">
                
                <div class="form-group">
                    <label class="form-label">Task Title</label>
                    <input type="text" id="modal-task-title" class="form-input" disabled>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label for="modal-status-select" class="form-label">Work Status</label>
                        <select id="modal-status-select" class="form-select" required>
                            <option value="pending">Pending</option>
                            <option value="in_progress">In Progress</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="modal-pct-slider" class="form-label">Completion (%): <span id="pct-display">0</span>%</label>
                        <input type="range" id="modal-pct-slider" min="0" max="100" step="5" class="form-input" style="padding: 0; height: 38px; cursor: pointer;">
                    </div>
                </div>

                <div class="form-group">
                    <label for="modal-remarks" class="form-label">Remarks / Comments</label>
                    <textarea id="modal-remarks" class="form-textarea" placeholder="Update on progress, impediments or details..."></textarea>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('status-modal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Submit Progress</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <!-- JS Logic -->
    <script src="js/employee_dashboard.js"></script>
</body>
</html>
