<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Secure portal to log in to the Organization Task Management System. Manage, prioritize, and track administrative and employee assignments.">
    <title>Login - Task Management System</title>
    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card glass-panel">
            <div class="auth-header">
                <div class="auth-logo">
                    <span class="auth-logo-icon">⚡</span>
                    <span class="auth-logo-text">TaskSync</span>
                </div>
                <p class="auth-subtitle">Sign in to your organization account</p>
            </div>

            <!-- Login Form -->
            <form id="login-form">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" class="form-input" placeholder="Enter your username" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
                    <span id="btn-text">Sign In</span>
                    <div id="btn-loader" class="loading-spinner" style="display: none; width: 18px; height: 18px; border-width: 2px;"></div>
                </button>
            </form>
        </div>
    </div>

    <!-- Toast container for errors and success messages -->
    <div id="toast-container"></div>

    <!-- Frontend logic script -->
    <script src="js/login.js"></script>
</body>
</html>
